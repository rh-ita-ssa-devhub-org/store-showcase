apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: quarkus-store-pipeline-test
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:

  params:
    - default: ""
      description: Url del repository git
      name: REPO_URL
      type: string
    - default: "quay.io/mcombi/quarkus-store-project"
      description: Image name
      name: IMAGE_NAME
      type: string
  tasks:
    - name: git-clone
      params:
        - name: url
          value: $(params.REPO_URL)
        - name: submodules
          value: 'true'
        - name: depth
          value: '1'
        - name: sslVerify
          value: 'false'
        - name: deleteExisting
          value: 'true'
        - name: verbose
          value: 'true'
#        - name: gitInitImage
#          value: >-
#            registry.redhat.io/openshift-pipelines/pipelines-git-init-rhel8@sha256:6c3980b3d28c8fb92b17466f5654d5f484ab893f1673ec8f29e49c0d03f8aca9
        - name: userHome
          value: /tekton/home
      taskRef:
        kind: ClusterTask
        name: git-clone
      workspaces:
        - name: output
          workspace: source
    - name: maven
      params:
        - name: MAVEN_IMAGE
          value: >-
            gcr.io/cloud-builders/mvn@sha256:57523fc43394d6d9d2414ee8d1c85ed7a13460cbb268c3cd16d28cfb3859e641
        - name: GOALS
          value:
            - test-compile
        - name: PROXY_PROTOCOL
          value: http
        - name: CONTEXT_DIR
          value: .
      runAfter:
        - git-clone
      taskRef:
        kind: ClusterTask
        name: maven
      workspaces:
        - name: source
          workspace: source
        - name: maven-settings
          workspace: source
    - name: s2i-java-11-custom
      params:
        - name: PATH_CONTEXT
          value: .
        - name: TLSVERIFY
          value: 'false'
        - name: MAVEN_CLEAR_REPO
          value: 'false'
        - name: IMAGE_NAME
          value: $(params.IMAGE_NAME)
        - name: IMAGE_TAG
          value: $(tasks.git-clone.results.commit)
      runAfter:
        - maven
      taskRef:
        kind: Task
        name: s2i-java-11-custom
      workspaces:
        - name: source
          workspace: source
    - name: git-update-deployment-test
      params:
        - name: GIT_REPOSITORY
          value: 'https://github.com/mcombi/store-demo-project.git'
        - name: GIT_USERNAME
          value: mcombi
        - name: GIT_PASSWORD
          value: CHANGEME
        - name: CURRENT_IMAGE
          value: quay.io/mcombi/quarkus-store-project
        - name: NEW_IMAGE
          value: quay.io/mcombi/quarkus-store-project
        - name: NEW_DIGEST
          value: $(tasks.git-clone.results.commit)
        - name: KUSTOMIZATION_PATH
          value: quarkus-store-config/app/kustomize/overlays/test
      runAfter:
        - s2i-java-11-custom
      taskRef:
        kind: Task
        name: git-update-deployment-test
      workspaces:
        - name: workspace
          workspace: source
  workspaces:
    - name: source