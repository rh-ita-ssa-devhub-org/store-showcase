apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: store-showcase-template
  title: Store Showcase
  description: Create a Store Showcase Application
  tags:
    - recommended
    - java
    - quarkus
    - maven
spec:
  owner: rhdh
  type: service
  parameters:
    - title:  Information for FrontEnd Application
      required:
        - fe_component_id
        - number_of_users
      properties:
        fe_component_id:
          title: Name
          type: string
          description: Unique name of the component
          default: store-frontend
          ui:field: EntityNamePicker
          maxLength: 18
        number_of_users:
          title: Number of Users
          type: string
          description: Expected number of users for the application
          enum:
            - 10-100
            - 100-1000
            - 1000-10000
        description:
          title: Description
          type: string
          description: Help others understand what this website is for.
          default: The frontend application for the store
    - title: Provide Information for Backend Orders Application
      required:
        - component_id
        - java_package_name
      properties:
        be_component_id:
          title: Name
          type: string
          description: Unique name of the component
          default: orders-backend
          ui:field: EntityNamePicker
          maxLength: 18
        group_id:
          title: Group Id
          type: string
          default: com.redhat.demo
          description: Maven Group Id
        artifact_id:
          title: Artifact Id
          type: string
          default: orders-backend
          description: Maven Artifact Id
        java_package_name:
          title: Java Package Name
          default: com.redhat.demo
          type: string
          description: Name for the java package. eg (com.redhat.blah)
        description:
          title: Description
          type: string
          description: Help others understand what this website is for.
          default: The backend to manage orders for the store
    - title: Provide Information for Backend Store Application
      required:
        - component_id
        - java_package_name
      properties:
        component_id:
          title: Name
          type: string
          description: Unique name of the component
          default: store-backend
          ui:field: EntityNamePicker
          maxLength: 18
        group_id:
          title: Group Id
          type: string
          default: com.redhat.demo
          description: Maven Group Id
        artifact_id:
          title: Artifact Id
          type: string
          default: store-backend
          description: Maven Artifact Id
        java_package_name:
          title: Java Package Name
          default: com.redhat.demo
          type: string
          description: Name for the java package. eg (com.redhat.blah)
        description:
          title: Description
          type: string
          description: Help others understand what this website is for.
          default: The orders backend application for the store
    - title: Provide Information for The Database
      required:
        - db_username
        - db_name
        - java_package_name
      properties:
        db_username:
          title: Database Username
          type: store-backend-db-username
          description: Unique name of the component
          default: my-quarkus-app
          ui:field: EntityNamePicker
          maxLength: 18
        db_name:
          title: Database Name
          type: string
          description: Unique name of the component
          default: store-db
          ui:field: EntityNamePicker
          maxLength: 18
        description:
          title: Description
          type: string
          description: Help others understand what this website is for.
          default: A cool quarkus app
    - title: Provide Information for Backend kafka Configuration
      required:
        - kafka_topic_name
        - kafka_cluster_name
      properties:
        kafka_topic_name:
          title: Topic Name
          type: string
          default: orders-out
          description: Kafka Topic Name to create
        kafka_cluster_name:
          title: Topic Cluster Name
          type: string
          default: orders-out
          description: Name of the Kafka Cluster to create the topic in
        description:
          title: Description
          type: string
          description: Help others understand what this website is for.
          default: A cool quarkus app
    - title: Provide Image Registry Information
      required:
        - image_registry
      properties:
        image_registry:
          title: Image Registry
          type: string
          enum:
            - OpenShift
            - Quay
      dependencies:
        image_registry:
          oneOf:
            - properties:
                image_registry:
                  enum:
                    - OpenShift
                image_host:
                  title: Image Host
                  type: string
                  description: Host for storing image
                  default: image-registry.openshift-image-registry.svc:5000
                image_tag:
                  title: Image Tag
                  default: latest
                  type: string
                  description: Build Image tag
            - properties:
                image_registry:
                  enum:
                    - Quay
                image_host:
                  title: Image Host
                  type: string
                  description: Host for storing image
                  default: quay.apps.cluster-vngth.vngth.sandbox1898.opentlc.com
                image_password:
                  title: Password
                  type: string
                  description: Your Quay password
                  ui:field: Secret
                image_tag:
                  title: Image Tag
                  default: latest
                  type: string
                  description: Build Image tag
    - title: Application repository Information
      required:
        - repo
      properties:
        repo:
          title: Repository Location
          type: object
          properties:
            host:
              title: Repo Host
              type: string
              description: Your SCM host
              default: gitlab-gitlab.apps.cluster-vngth.vngth.sandbox1898.opentlc.com
              enum:
                - gitlab-gitlab.apps.cluster-vngth.vngth.sandbox1898.opentlc.com

  steps:
    - id: template
      name: Fetch Skeleton + Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          component_id: ${{ parameters.component_id }}
          description: ${{ parameters.description }}
          namespace: ${{ parameters.component_id }}-dev
          group_id: ${{ parameters.group_id }}
          artifact_id: ${{ parameters.artifact_id }}
          java_package_name: ${{ parameters.java_package_name }}
          owner: ${{ user.entity.metadata.name }}
          cluster: apps.cluster-vngth.vngth.sandbox1898.opentlc.com
          host: ${{ parameters.repo.host }}
          destination: ${{ user.entity.metadata.name }}/${{ parameters.component_id }}
          port: 8080
          gitops_namespace: rhdh-gitops
        targetPath: ./${{ user.entity.metadata.name }}-${{parameters.component_id}}

    - id: publish
      name: Publish
      action: publish:gitlab
      input:
        repoUrl: "${{ parameters.repo.host }}?owner=${{ user.entity.metadata.name }}&repo=${{parameters.component_id}}"
        repoVisibility: public
        defaultBranch: main
        sourcePath: ./${{ user.entity.metadata.name }}-${{parameters.component_id}}

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

    - id: template-gitops-deployment
      name: Generating Deployment Resources
      action: fetch:template
      input:
        url: ./manifests
        copyWithoutTemplating: []
        values:
          component_id: ${{ parameters.component_id }}
          source_repository_gitops: https://${{ parameters.repo.host }}/${{ user.entity.metadata.name }}/${{parameters.component_id}}-gitops.git
          source_repository: https://${{ parameters.repo.host }}/${{ user.entity.metadata.name }}/${{parameters.component_id}}.git
          owner: ${{ user.entity.metadata.name }}
          namespace: ${{ user.entity.metadata.name }}-${{ parameters.component_id }}-dev
          image_registry: ${{ parameters.image_registry }}
          image_host: ${{ parameters.image_host }}
          image_organization: ${{ user.entity.metadata.name }}
          image_password: ${{ secrets.image_password }}
          image_name: ${{ parameters.component_id }}
          image_tag: ${{ parameters.image_tag }}
          gitops_namespace: rhdh-gitops
          gitops_project: default
          port: 8080
          cluster_subdomain: apps.cluster-vngth.vngth.sandbox1898.opentlc.com
          repository_host: ${{ parameters.repo.host }}
        targetPath: ./${{ user.entity.metadata.name }}-${{parameters.component_id}}-gitops

    - id: publish-gitops
      name: Publishing to Resource Repository
      action: publish:gitlab
      input:
        repoUrl: "${{ parameters.repo.host }}?owner=${{ user.entity.metadata.name }}&repo=${{parameters.component_id}}-gitops"
        repoVisibility: public
        defaultBranch: main
        title: gitops resources for ${{ parameters.component_id }}
        description: gitops resources for ${{ parameters.component_id }}
        sourcePath: ./${{ user.entity.metadata.name }}-${{parameters.component_id}}-gitops

    - id: create-argocd-resources
      name: Create Argo CD Resources
      action: argocd:create-resources
      input:
        appName: ${{ user.entity.metadata.name }}-${{ parameters.component_id }}-bootstrap
        argoInstance: main
        namespace: rhdh-gitops
        repoUrl: https://${{ parameters.repo.host }}/${{ user.entity.metadata.name }}/${{ parameters.component_id }}-gitops.git
        path: 'argocd/'

  output:
    links:
      - title: Source Code Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open Component in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
