{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "spring-store.fullname" . }}-monitor
  labels:
    {{- include "spring-store.labels" . | nindent 4 }}
spec:
  endpoints:
    - interval: {{ .Values.serviceMonitor.interval }}
      path: {{ .Values.serviceMonitor.path }}
      port: http
      scheme: http
  selector:
    matchLabels:
      {{- include "spring-store.selectorLabels" . | nindent 6 }}
{{- end }}

