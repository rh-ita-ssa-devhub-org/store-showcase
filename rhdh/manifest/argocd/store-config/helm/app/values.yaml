# Default values for store-backend
replicaCount: 1

image:
  repository: quay.io/mcombi/quarkus-store-project
  tag: "1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

route:
  enabled: true
  host: ""
  tls:
    enabled: false
    termination: edge

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

probes:
  enabled: false
  readiness:
    path: /q/health/ready
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /q/health/live
    initialDelaySeconds: 15
    periodSeconds: 20

serviceMonitor:
  enabled: true
  interval: 30s
  path: /q/metrics

env: []
  # - name: EXAMPLE_VAR
  #   value: "example-value"

nodeSelector: {}

tolerations: []

affinity: {}

